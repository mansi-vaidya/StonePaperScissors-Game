<!DOCTYPE html>
<html>
<head>
    <title>RPS Game</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            font-size: 32px;
        }

        .players {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .player {
            width: 45%;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
            width: 80%;
            margin-bottom: 10px;
        }

        .choices button {
            margin: 5px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        .choices button:hover {
            transform: scale(1.1);
        }

        .selected {
            background: #00c6ff;
            color: black;
        }

        .play-btn {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            background: #ff7eb3;
            color: white;
            cursor: pointer;
        }

        .scoreboard {
            margin-top: 20px;
            font-size: 20px;
        }

        .result {
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .winner {
            margin-top: 20px;
            font-size: 26px;
            color: yellow;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Rock Paper Scissors</h1>

    <div class="players">

        <!-- Player 1 -->
        <div class="player">
            <input type="text" id="p1" placeholder="Player 1 Name">
            <div class="choices">
                <button class="p1" id="p1-stone" onclick="selectP1('stone')">🪨</button>
                <button class="p1" id="p1-paper" onclick="selectP1('paper')">📄</button>
                <button class="p1" id="p1-scissors" onclick="selectP1('scissors')">✂️</button>
            </div>
        </div>

        <!-- Player 2 -->
        <div class="player">
            <input type="text" id="p2" placeholder="Player 2 Name">
            <div class="choices">
                <button class="p2" id="p2-stone" onclick="selectP2('stone')">🪨</button>
                <button class="p2" id="p2-paper" onclick="selectP2('paper')">📄</button>
                <button class="p2" id="p2-scissors" onclick="selectP2('scissors')">✂️</button>
            </div>
        </div>

    </div>

    <button class="play-btn" onclick="playRound()">▶ Play Round</button>

    <div class="scoreboard" id="score">Score: 0 - 0</div>
    <div class="scoreboard" id="round">Round: 0 / 6</div>

    <div class="result" id="result"></div>
    <div class="winner" id="winner"></div>

</div>

<script>
let p1Choice = "", p2Choice = "";
let round = 0, p1Score = 0, p2Score = 0;
let rounds = [];

function selectP1(choice) {
    p1Choice = choice;
    document.querySelectorAll(".p1").forEach(b => b.classList.remove("selected"));
    document.getElementById("p1-"+choice).classList.add("selected");
}

function selectP2(choice) {
    p2Choice = choice;
    document.querySelectorAll(".p2").forEach(b => b.classList.remove("selected"));
    document.getElementById("p2-"+choice).classList.add("selected");
}

function playRound() {
    if (!p1Choice || !p2Choice) {
        alert("Both players must choose!");
        return;
    }

    let p1Name = document.getElementById("p1").value || "Player1";
    let p2Name = document.getElementById("p2").value || "Player2";

    let result = "";

    if (p1Choice === p2Choice) result = "Tie 🤝";
    else if (
        (p1Choice==="stone"&&p2Choice==="scissors") ||
        (p1Choice==="scissors"&&p2Choice==="paper") ||
        (p1Choice==="paper"&&p2Choice==="stone")
    ) {
        result = p1Name + " wins this round 🎉";
        p1Score++;
    } else {
        result = p2Name + " wins this round 🎉";
        p2Score++;
    }

    rounds.push({p1Choice,p2Choice,result});
    round++;

    document.getElementById("result").innerText = result;
    document.getElementById("score").innerText = `Score: ${p1Score} - ${p2Score}`;
    document.getElementById("round").innerText = `Round: ${round} / 6`;

    if (round === 6) finishGame();
}

function finishGame() {
    let p1Name = document.getElementById("p1").value || "Player1";
    let p2Name = document.getElementById("p2").value || "Player2";

    let finalWinner = p1Score > p2Score ? p1Name : p2Name;

    document.getElementById("winner").innerText = "🏆 Winner: " + finalWinner;

    fetch("http://localhost:8080/api/games", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            player1: p1Name,
            player2: p2Name,
            rounds: JSON.stringify(rounds),
            finalWinner: finalWinner
        })
    });
}
</script>

</body>
</html>
